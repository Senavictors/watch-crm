services:
  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secretroot
      MYSQL_DATABASE: queiroz_prime
      MYSQL_USER: queiroz
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: queiroz_prime
      DB_USERNAME: queiroz
      DB_PASSWORD: secret
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "cp -n .env.example .env
      && composer install
      && php artisan key:generate --force
      && php artisan migrate --force --seed
      && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "4001:4001"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && exec npm run dev -- --webpack -p 4001 --hostname 0.0.0.0"

volumes:
  mysql_data:
  backend_vendor:
  frontend_node_modules:
